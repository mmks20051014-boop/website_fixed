    <script>
        // Blog functionality
        document.addEventListener('DOMContentLoaded', function() {
            const categoryButtons = document.querySelectorAll('.category-btn');
            const articleCards = document.querySelectorAll('#articlesGrid .article-card');
            const searchInput = document.getElementById('searchInput');
            const noResults = document.getElementById('noResults');
            let currentCategory = 'all';

            // Category filtering
            categoryButtons.forEach(button => {
                button.addEventListener('click', function() {
                    const category = this.dataset.category;
                    
                    // Update active button
                    categoryButtons.forEach(btn => btn.classList.remove('active'));
                    this.classList.add('active');
                    
                    currentCategory = category;
                    filterArticles();
                });
            });

            // Search functionality
            searchInput.addEventListener('input', function() {
                filterArticles();
            });

            // Filter articles based on category and search
            function filterArticles() {
                const searchTerm = searchInput.value.toLowerCase();
                let visibleCount = 0;

                articleCards.forEach(card => {
                    const title = card.querySelector('h3').textContent.toLowerCase();
                    const excerpt = card.querySelector('.article-excerpt').textContent.toLowerCase();
                    const tags = Array.from(card.querySelectorAll('.tag')).map(tag => tag.textContent.toLowerCase());
                    
                    const matchesSearch = title.includes(searchTerm) || 
                                        excerpt.includes(searchTerm) ||
                                        tags.some(tag => tag.includes(searchTerm));
                    
                    const matchesCategory = currentCategory === 'all' || 
                                          card.dataset.category.includes(currentCategory);
                    
                    if (matchesSearch && matchesCategory) {
                        card.style.display = 'block';
                        card.classList.remove('hidden');
                        visibleCount++;
                    } else {
                        card.style.display = 'none';
                        card.classList.add('hidden');
                    }
                });

                // Show/hide no results message
                if (visibleCount === 0) {
                    noResults.style.display = 'block';
                } else {
                    noResults.style.display = 'none';
                }
            }

            // Article card click handlers
            articleCards.forEach(card => {
                card.addEventListener('click', function(e) {
                    // Don't trigger if clicking on links
                    if (e.target.tagName === 'A' || e.target.closest('a')) {
                        return;
                    }
                    
                    const readMoreLink = card.querySelector('.read-more');
                    if (readMoreLink) {
                        readMoreLink.click();
                    }
                });
            });
        });
    </script>


    <!-- ===== Nav: Hamburger + Active highlight ===== -->
    <script>
    (function () {
        'use strict';

        /* ---- ① Hamburger Menu ---- */
        var btn     = document.getElementById('hamburgerBtn');
        var navList = document.getElementById('navLinks');
        var overlay = document.getElementById('navOverlay');

        function openMenu() {
            navList.classList.add('open');
            overlay.classList.add('active');
            btn.classList.add('open');
            btn.setAttribute('aria-expanded', 'true');
            document.body.style.overflow = 'hidden';
        }
        function closeMenu() {
            navList.classList.remove('open');
            overlay.classList.remove('active');
            btn.classList.remove('open');
            btn.setAttribute('aria-expanded', 'false');
            document.body.style.overflow = '';
        }

        if (btn) {
            btn.addEventListener('click', function () {
                navList.classList.contains('open') ? closeMenu() : openMenu();
            });
        }
        if (overlay) {
            overlay.addEventListener('click', closeMenu);
        }
        // Escキーで閉じる
        document.addEventListener('keydown', function (e) {
            if (e.key === 'Escape') closeMenu();
        });
        // ナビリンク クリックで閉じる（スマホ内遷移）
        if (navList) {
            navList.querySelectorAll('a').forEach(function (a) {
                a.addEventListener('click', closeMenu);
            });
        }

        /* ---- ② Active Nav Highlight ---- */
        var currentPath = window.location.pathname.split('/').pop() || 'index.html';
        if (currentPath === '') currentPath = 'index.html';
        if (navList) {
            navList.querySelectorAll('a').forEach(function (a) {
                var href = a.getAttribute('href');
                if (!href) return;
                // ページ内アンカーは除外
                if (href.startsWith('#')) return;
                var linkFile = href.split('/').pop().split('?')[0].split('#')[0];
                var isCurrent = (linkFile === currentPath) ||
                    (currentPath === 'index.html' && (linkFile === '' || linkFile === 'index.html'));
                if (isCurrent) {
                    // 既存インラインスタイルを保持しつつクラス付与
                    a.classList.add('nav-active');
                    // インラインスタイルが未設定の場合のみ色を付与
                    if (!a.style.color) {
                        a.style.color = 'var(--accent-cyan, #22d3ee)';
                    }
                }
            });
        }
    })();
    </script>
    <!-- ===== /Nav: Hamburger + Active highlight ===== -->

    <!-- ===== Smooth Scroll ===== -->
    <script>
    (function () {
        'use strict';

        // ① CSS レベルのスムーススクロール（最低限の保険）
        document.documentElement.style.scrollBehavior = 'smooth';

        // ② JS レベル：ヘッダー高さを考慮した精密スクロール
        document.addEventListener('DOMContentLoaded', function () {
            document.querySelectorAll('a[href^="#"]').forEach(function (anchor) {
                anchor.addEventListener('click', function (e) {
                    var href = this.getAttribute('href');
                    if (!href || href === '#') return;
                    var target = document.querySelector(href);
                    if (!target) return;
                    e.preventDefault();
                    var header = document.querySelector('header');
                    var headerH = header ? header.offsetHeight : 0;
                    var OFFSET = 16; // ヘッダー下の余白
                    var top =
                        target.getBoundingClientRect().top +
                        window.pageYOffset -
                        headerH -
                        OFFSET;
                    window.scrollTo({ top: Math.max(0, top), behavior: 'smooth' });
                });
            });
        });
    })();
    </script>
</body>
</html>
